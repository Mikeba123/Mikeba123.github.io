	<!DOCTYPE html>
	<html lang="zh-CN">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <title>我的在线笔记库</title>
	    <style>
	        :root {
	            --primary-color: #4CAF50;
	            --bg-color: #f4f7f6;
	            --text-color: #333;
	            --sidebar-bg: #ffffff;
	        }
	        * {
	            box-sizing: border-box;
	            margin: 0;
	            padding: 0;
	            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
	        }
	        body {
	            background-color: var(--bg-color);
	            color: var(--text-color);
	            line-height: 1.7;
	            height: 100vh;
	            display: flex;
	            flex-direction: column;
	        }
	        header {
	            background-color: var(--primary-color);
	            color: white;
	            padding: 1rem 1.5rem;
	            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
	            display: flex;
	            justify-content: space-between;
	            align-items: center;
	            flex-wrap: wrap;
	        }
	        header h1 { font-size: 1.5rem; }
	        .breadcrumb {
	            font-size: 0.9rem;
	            opacity: 0.9;
	            margin-top: 5px;
	            width: 100%;
	        }
	        .breadcrumb span { cursor: pointer; text-decoration: underline; }
	        .container {
	            display: flex;
	            flex: 1;
	            overflow: hidden;
	            padding: 15px;
	            gap: 15px;
	        }
	        /* 左侧目录树 */
	        aside {
	            width: 300px;
	            background: var(--sidebar-bg);
	            padding: 15px;
	            border-radius: 8px;
	            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
	            overflow-y: auto;
	            display: flex;
	            flex-direction: column;
	        }
	        .sidebar-actions {
	            display: flex;
	            gap: 10px;
	            margin-bottom: 15px;
	        }
	        .sidebar-actions button {
	            flex: 1;
	            padding: 8px;
	            font-size: 14px;
	        }
	        .tree-item {
	            padding: 8px 10px;
	            cursor: pointer;
	            border-radius: 4px;
	            display: flex;
	            align-items: center;
	            justify-content: space-between;
	            transition: background 0.2s;
	            user-select: none;
	        }
	        .tree-item:hover { background: #eef; }
	        .tree-item.active { background: #e0f7fa; border-left: 3px solid var(--primary-color); }
	        .tree-item .label { display: flex; align-items: center; gap: 6px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
	        .tree-children { margin-left: 20px; border-left: 1px dashed #ddd; }
	        .delete-btn {
	            background: transparent;
	            color: #ff4d4f;
	            border: none;
	            font-size: 14px;
	            cursor: pointer;
	            opacity: 0;
	            transition: opacity 0.2s;
	        }
	        .tree-item:hover .delete-btn { opacity: 1; }
	        /* 右侧编辑区 */
	        main {
	            flex: 1;
	            background: var(--sidebar-bg);
	            padding: 20px;
	            border-radius: 8px;
	            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
	            display: flex;
	            flex-direction: column;
	            overflow: hidden;
	        }
	        .input-group { margin-bottom: 15px; }
	        input[type="text"], textarea {
	            width: 100%;
	            padding: 10px;
	            border: 1px solid #ccc;
	            border-radius: 4px;
	            font-size: 16px;
	        }
	        textarea {
	            flex: 1;
	            resize: none;
	            font-family: inherit;
	            line-height: 1.6;
	        }
	        button {
	            background: var(--primary-color);
	            color: white;
	            border: none;
	            padding: 8px 16px;
	            border-radius: 4px;
	            cursor: pointer;
	            font-size: 14px;
	        }
	        button:hover { opacity: 0.9; }
	        #saveBtn { background: #008CBA; align-self: flex-start; margin-top: 15px;}
	        .placeholder {
	            display: flex;
	            height: 100%;
	            align-items: center;
	            justify-content: center;
	            color: #888;
	            font-size: 1.2rem;
	        }
	        @media (max-width: 768px) {
	            .container { flex-direction: column; }
	            aside { width: 100%; height: 35vh; }
	            main { height: 60vh; }
	        }
	    </style>
	</head>
	<body>
	    <header>
	        <h1>📒 我的在线笔记库</h1>
	        <div class="breadcrumb" id="breadcrumb">当前目录：<span onclick="navigateTo('root')">根目录</span></div>
	    </header>
	    <div class="container">
	        <aside>
	            <div class="sidebar-actions">
	                <button onclick="createItem('folder')">📁 新建文件夹</button>
	                <button onclick="createItem('note')">📄 新建笔记</button>
	            </div>
	            <div id="treeContainer"></div>
	        </aside>
	        <main>
	            <div id="editorView" style="display: none; flex: 1; flex-direction: column;">
	                <div class="input-group">
	                    <input type="text" id="noteTitle" placeholder="输入笔记标题...">
	                </div>
	                <textarea id="noteContent" placeholder="在这里输入笔记内容..."></textarea>
	                <button id="saveBtn" onclick="saveNote()">💾 保存笔记</button>
	            </div>
	            <div id="placeholderView" class="placeholder">
	                请在左侧选择一篇笔记进行编辑，或点击左上角新建笔记
	            </div>
	        </main>
	    </div>
	    <script>
	        // 数据结构：树形结构
	        let fileSystem = JSON.parse(localStorage.getItem('myNoteFileSystem')) || {
	            id: 'root', name: '我的笔记库', type: 'folder', children: []
	        };
	        let currentNoteId = null;
	        let currentFolderId = 'root'; // 默认在根目录操作
	        let expandedFolders = JSON.parse(localStorage.getItem('expandedFolders')) || ['root']; // 记录展开状态
	        // 递归查找节点
	        function findNode(node, id) {
	            if (node.id === id) return node;
	            if (node.type === 'folder' && node.children) {
	                for (let child of node.children) {
	                    let result = findNode(child, id);
	                    if (result) return result;
	                }
	            }
	            return null;
	        }
	        // 递归查找父节点
	        function findParent(node, id, parent = null) {
	            if (node.id === id) return parent;
	            if (node.type === 'folder' && node.children) {
	                for (let child of node.children) {
	                    let result = findParent(child, id, node);
	                    if (result) return result;
	                }
	            }
	            return null;
	        }
	        // 获取当前路径
	        function getPath(id) {
	            let path = [];
	            let current = findNode(fileSystem, id);
	            while (current && current.id !== 'root') {
	                path.unshift(current.name);
	                current = findParent(fileSystem, current.id);
	            }
	            return path.length > 0 ? '根目录 / ' + path.join(' / ') : '根目录';
	        }
	        // 渲染左侧树状结构
	        function renderTree() {
	            const container = document.getElementById('treeContainer');
	            container.innerHTML = '';
	            renderNode(fileSystem, container, 0);
	            updateBreadcrumb();
	        }
	        function renderNode(node, container, level) {
	            if (node.id !== 'root') {
	                let div = document.createElement('div');
	                div.className = 'tree-item';
	                // 高亮当前选中的笔记和文件夹
	                if (node.id === currentNoteId || node.id === currentFolderId) {
	                    div.classList.add('active');
	                }
	                let icon = node.type === 'folder' ? (expandedFolders.includes(node.id) ? '📂' : '📁') : '📄';
	                div.innerHTML = `
	                    <span class="label" style="padding-left: ${level * 15}px">
	                        ${icon} ${node.name}
	                    </span>
	                    <button class="delete-btn" onclick="event.stopPropagation(); deleteItem('${node.id}')">🗑️</button>
	                `;
	                div.onclick = (e) => {
	                    e.stopPropagation();
	                    if (node.type === 'folder') {
	                        currentFolderId = node.id; // 进入该文件夹
	                        toggleFolder(node.id);
	                    } else {
	                        currentNoteId = node.id; // 选中该笔记
	                        currentFolderId = findParent(fileSystem, node.id).id; // 切换到笔记所在目录
	                        loadNote(node);
	                    }
	                    renderTree();
	                };
	                container.appendChild(div);
	            }
	            // 渲染子节点
	            if (node.type === 'folder' && expandedFolders.includes(node.id) && node.children) {
	                let childContainer = document.createElement('div');
	                childContainer.className = 'tree-children';
	                node.children.forEach(child => renderNode(child, childContainer, level + 1));
	                container.appendChild(childContainer);
	            }
	        }
	        function updateBreadcrumb() {
	            document.getElementById('breadcrumb').innerHTML = `当前目录：${getPath(currentFolderId)}`;
	        }
	        function toggleFolder(id) {
	            let index = expandedFolders.indexOf(id);
	            if (index > -1) {
	                expandedFolders.splice(index, 1);
	            } else {
	                expandedFolders.push(id);
	            }
	            localStorage.setItem('expandedFolders', JSON.stringify(expandedFolders));
	        }
	        function navigateTo(id) {
	            currentFolderId = id;
	            if (!expandedFolders.includes(id)) toggleFolder(id);
	            renderTree();
	        }
	        function createItem(type) {
	            let name = prompt(`请输入${type === 'folder' ? '文件夹' : '笔记'}名称：`, type === 'folder' ? '新建文件夹' : '新建笔记');
	            if (!name) return;
	            let parent = findNode(fileSystem, currentFolderId);
	            if (!parent || parent.type !== 'folder') return;
	            let newItem = {
	                id: 'item_' + Date.now(),
	                name: name,
	                type: type
	            };
	            if (type === 'folder') {
	                newItem.children = [];
	                if (!expandedFolders.includes(newItem.id)) expandedFolders.push(newItem.id);
	            } else {
	                newItem.content = '';
	                currentNoteId = newItem.id; // 自动选中新笔记
	            }
	            parent.children.push(newItem);
	            saveFileSystem();
	            renderTree();
	            if (type === 'note') {
	                loadNote(newItem);
	            }
	        }
	        function loadNote(note) {
	            document.getElementById('editorView').style.display = 'flex';
	            document.getElementById('placeholderView').style.display = 'none';
	            document.getElementById('noteTitle').value = note.name;
	            document.getElementById('noteContent').value = note.content || '';
	        }
	        function saveNote() {
	            if (!currentNoteId) return;
	            let note = findNode(fileSystem, currentNoteId);
	            let title = document.getElementById('noteTitle').value.trim();
	            if (!title) title = "无标题笔记";
	            note.name = title;
	            note.content = document.getElementById('noteContent').value;
	            saveFileSystem();
	            renderTree();
	            alert('保存成功！');
	        }
	        function deleteItem(id) {
	            if (!confirm('确定要删除该项吗？如果是文件夹，内部所有内容将被一并删除！')) return;
	            let parent = findParent(fileSystem, id);
	            if (!parent) return;
	            parent.children = parent.children.filter(child => child.id !== id);
	            if (currentNoteId === id) {
	                currentNoteId = null;
	                document.getElementById('editorView').style.display = 'none';
	                document.getElementById('placeholderView').style.display = 'flex';
	            }
	            saveFileSystem();
	            renderTree();
	        }
	        function saveFileSystem() {
	            localStorage.setItem('myNoteFileSystem', JSON.stringify(fileSystem));
	        }
	        // 初始化
	        renderTree();
	    </script>
	</body>
	</html>
