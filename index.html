	<!DOCTYPE html>
	<html lang="zh-CN">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <title>我的在线笔记</title>
	    <style>
	        :root {
	            --primary-color: #4CAF50;
	            --bg-color: #f4f7f6;
	            --text-color: #333;
	            --sidebar-bg: #2c3e50;
	        }
	        * {
	            box-sizing: border-box;
	            margin: 0;
	            padding: 0;
	            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
	        }
	        body {
	            background-color: var(--bg-color);
	            color: var(--text-color);
	            line-height: 1.7;
	        }
	        header {
	            background-color: var(--primary-color);
	            color: white;
	            padding: 1rem;
	            text-align: center;
	            position: sticky;
	            top: 0;
	            z-index: 100;
	            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
	        }
	        .container {
	            display: flex;
	            max-width: 1000px;
	            margin: 20px auto;
	            padding: 0 15px;
	        }
	        /* 侧边栏：笔记列表 */
	        aside {
	            width: 30%;
	            background: white;
	            padding: 15px;
	            border-radius: 8px;
	            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
	            height: 80vh;
	            overflow-y: auto;
	            margin-right: 20px;
	        }
	        aside h3 {
	            margin-bottom: 15px;
	            border-bottom: 2px solid var(--primary-color);
	            padding-bottom: 10px;
	        }
	        .note-list-item {
	            background: #f9f9f9;
	            padding: 10px;
	            margin-bottom: 10px;
	            border-radius: 4px;
	            cursor: pointer;
	            display: flex;
	            justify-content: space-between;
	            align-items: center;
	            transition: background 0.2s;
	        }
	        .note-list-item:hover { background: #eef; }
	        .note-list-item.active { background: #e0f7fa; border-left: 4px solid var(--primary-color); }
	        .delete-btn {
	            background: #ff4d4f;
	            color: white;
	            border: none;
	            padding: 3px 8px;
	            border-radius: 4px;
	            cursor: pointer;
	            font-size: 12px;
	        }
	        /* 主内容区：编辑与查看 */
	        main {
	            flex: 1;
	            background: white;
	            padding: 20px;
	            border-radius: 8px;
	            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
	            display: flex;
	            flex-direction: column;
	            height: 80vh;
	        }
	        .input-group {
	            margin-bottom: 15px;
	        }
	        input[type="text"], textarea {
	            width: 100%;
	            padding: 10px;
	            border: 1px solid #ccc;
	            border-radius: 4px;
	            font-size: 16px;
	        }
	        textarea {
	            flex: 1;
	            resize: none;
	            font-family: inherit;
	            line-height: 1.5;
	        }
	        .btn-group {
	            margin-top: 15px;
	            display: flex;
	            gap: 10px;
	        }
	        button {
	            background: var(--primary-color);
	            color: white;
	            border: none;
	            padding: 10px 20px;
	            border-radius: 4px;
	            cursor: pointer;
	            font-size: 16px;
	        }
	        button:hover { opacity: 0.9; }
	        #newNoteBtn { background: #008CBA; }
	        @media (max-width: 768px) {
	            .container { flex-direction: column; }
	            aside { width: 100%; margin-right: 0; margin-bottom: 20px; height: auto; max-height: 30vh; }
	            main { height: auto; min-height: 50vh; }
	        }
	    </style>
	</head>
	<body>
	    <header>
	        <h1>我的在线笔记</h1>
	    </header>
	    <div class="container">
	        <!-- 左侧：笔记列表 -->
	        <aside>
	            <h3>📝 笔记列表</h3>
	            <div id="noteList"></div>
	        </aside>
	        <!-- 右侧：编辑区 -->
	        <main>
	            <div class="input-group">
	                <input type="text" id="noteTitle" placeholder="输入笔记标题...">
	            </div>
	            <textarea id="noteContent" placeholder="在这里输入笔记内容...支持实时保存，手机电脑同步查看。"></textarea>
	            <div class="btn-group">
	                <button onclick="saveNote()">💾 保存笔记</button>
	                <button id="newNoteBtn" onclick="newNote()">➕ 新建笔记</button>
	            </div>
	        </main>
	    </div>
	    <script>
	        let notes = JSON.parse(localStorage.getItem('myNotes')) || [];
	        let currentNoteId = null;
	        function renderList() {
	            let listEl = document.getElementById('noteList');
	            if (notes.length === 0) {
	                listEl.innerHTML = '<p style="color:#999;font-size:14px;">暂无笔记，点击右侧新建。</p>';
	                return;
	            }
	            listEl.innerHTML = '';
	            notes.forEach(note => {
	                let div = document.createElement('div');
	                div.className = 'note-list-item' + (note.id === currentNoteId ? ' active' : '');
	                div.innerHTML = `
	                    <span onclick="loadNote(${note.id})">${note.title}</span>
	                    <button class="delete-btn" onclick="deleteNote(${note.id})">删除</button>
	                `;
	                listEl.appendChild(div);
	            });
	        }
	        function loadNote(id) {
	            let note = notes.find(n => n.id === id);
	            if (note) {
	                document.getElementById('noteTitle').value = note.title;
	                document.getElementById('noteContent').value = note.content;
	                currentNoteId = id;
	                renderList();
	            }
	        }
	        function saveNote() {
	            let title = document.getElementById('noteTitle').value.trim();
	            let content = document.getElementById('noteContent').value.trim();
	            if (!title && !content) {
	                alert('标题和内容不能都为空！');
	                return;
	            }
	            if (!title) title = "无标题笔记";
	            if (currentNoteId) {
	                // 更新已有笔记
	                let note = notes.find(n => n.id === currentNoteId);
	                note.title = title;
	                note.content = content;
	            } else {
	                // 新增笔记
	                let newNote = {
	                    id: Date.now(),
	                    title: title,
	                    content: content
	                };
	                notes.unshift(newNote);
	                currentNoteId = newNote.id;
	            }
	            localStorage.setItem('myNotes', JSON.stringify(notes));
	            renderList();
	            alert('保存成功！');
	        }
	        function newNote() {
	            document.getElementById('noteTitle').value = '';
	            document.getElementById('noteContent').value = '';
	            currentNoteId = null;
	            renderList();
	        }
	        function deleteNote(id) {
	            if (confirm('确定要删除这条笔记吗？')) {
	                notes = notes.filter(n => n.id !== id);
	                localStorage.setItem('myNotes', JSON.stringify(notes));
	                if (currentNoteId === id) {
	                    newNote();
	                }
	                renderList();
	            }
	        }
	        // 初始化
	        renderList();
	    </script>
	</body>
	</html>
